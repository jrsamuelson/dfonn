function getWeekStart(offset = 0) {
  const now = new Date();
  const day = now.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff + offset * 7);
  mon.setHours(0, 0, 0, 0);
  return mon;
}
function getWeekDates(ws) {
  return DAYS.map((_, i) => {
    const d = new Date(ws);
    d.setDate(ws.getDate() + i);
    return d;
  });
}
function getDefaultStatusForDay(onn, day) {
  if (onn?.floater) return STATUS.OFF;
  return onn?.defaults?.[day] || STATUS.CH;
}
function buildDefault(teamOnns = ONNs) {
  const data = {};
  DAYS.forEach(day => {
    data[day] = {
      notes: "",
      staff: {}
    };
    teamOnns.forEach(o => {
      data[day].staff[o.id] = {
        status: getDefaultStatusForDay(o, day),
        cov1: "",
        cov2: "",
        docCoverage: {},
        returnDate: "",
        note: "",
        floaterActive: false,
        floaterLoc: o.floater ? STATUS.CH : ""
      };
    });
  });
  return data;
}

function hydrateWeekData(data, teamOnns = ONNs) {
  const next = {};
  DAYS.forEach(day => {
    const srcDay = data?.[day] || {};
    const srcStaff = srcDay?.staff || {};
    const staff = {};
    teamOnns.forEach(o => {
      const existing = srcStaff[o.id] || {};
      const _existingReturnDate = typeof existing?.returnDate === "string" ? toISODateString(existing.returnDate) : "";
      const _existingDocCoverage = existing?.docCoverage || {};
      const _existingFloaterLoc = o.floater ? existing?.floaterLoc || STATUS.CH : "";
      staff[o.id] = {
        status: getDefaultStatusForDay(o, day),
        cov1: "",
        cov2: "",
        docCoverage: _existingDocCoverage,
        returnDate: _existingReturnDate,
        note: "",
        floaterActive: false,
        floaterLoc: _existingFloaterLoc,
        ...existing,
        returnDate: _existingReturnDate,
        docCoverage: _existingDocCoverage,
        floaterLoc: _existingFloaterLoc
      };
    });
    next[day] = {
      notes: srcDay?.notes || "",
      holiday: !!srcDay?.holiday,
      staff
    };
  });
  return next;
}
function fmt(d) {
  return d.toLocaleDateString("en-US", {
    month: "short",
    day: "numeric"

}
function fmtMD(dateStr) {
  const d = parseDateAtStartOfDay(dateStr);
  if (!d) return "";
  return d.toLocaleDateString("en-US", {
    month: "numeric",
    day: "numeric"
  });
}
function statusLabelForSlot(slot) {
  const sc = STATUS_CONFIG[slot?.status] || STATUS_CONFIG[STATUS.CH];
  if (slot?.status === STATUS.VACATION) {

    return md ? `Vacation til ${md}` : "Vacation";

  return sc.label;
}
function printSlotStatus(slot, onn) {

}
function printStatusLabelForSlot(slot, onn) {

  if (s === STATUS.OFF) return "Off";

  return "Chestnut Hill";
}
function parseDateAtStartOfDay(dateStr) {
  if (!dateStr) return null;
  const s = String(dateStr).trim();
  let y = 0;
  let m = 0;
  let dnum = 0;
  let mIso = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (mIso) {
    y = Number(mIso[1]);
    m = Number(mIso[2]);
    dnum = Number(mIso[3]);
  } else {
    const mUS = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (mUS) {
      m = Number(mUS[1]);
      dnum = Number(mUS[2]);
      y = Number(mUS[3]);
    } else {
      const parsed = new Date(s);
      if (Number.isNaN(parsed.getTime())) return null;
      parsed.setHours(0, 0, 0, 0);
      return parsed;
    }
  }
  if (!y || !m || !dnum) return null;
  const d = new Date(y, m - 1, dnum);
  if (d.getFullYear() !== y || d.getMonth() !== m - 1 || d.getDate() !== dnum) return null;
  d.setHours(0, 0, 0, 0);
  return d;
}
function toISODateString(dateStr) {
  const d = parseDateAtStartOfDay(dateStr);
  if (!d) return "";
  const yy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${yy}-${mm}-${dd}`;
}
function sameDay(a, b) {
  const da = parseDateAtStartOfDay(a);
  const db = parseDateAtStartOfDay(b);
  return !!da && !!db && da.getTime() === db.getTime();
}
function getSlot(dayData, onnId) {
  const raw = dayData?.staff?.[onnId];
  if (!raw || typeof raw !== "object") {
    return {
      status: STATUS.CH,
      cov1: "",
      cov2: "",
      docCoverage: {},
      returnDate: "",
      note: "",
      floaterActive: false,
      floaterLoc: STATUS.CH
    };
  }
  return {
    status: STATUS_CONFIG[raw.status] ? raw.status : STATUS.CH,
    cov1: typeof raw.cov1 === "string" ? raw.cov1 : "",
    cov2: typeof raw.cov2 === "string" ? raw.cov2 : "",
    docCoverage: raw.docCoverage && typeof raw.docCoverage === "object" ? raw.docCoverage : {},
    returnDate: typeof raw.returnDate === "string" ? toISODateString(raw.returnDate) : "",
    note: typeof raw.note === "string" ? raw.note : "",
    floaterActive: !!raw.floaterActive,
    floaterLoc: STATUS_CONFIG[raw.floaterLoc] ? raw.floaterLoc : STATUS.CH
  };
}

// Build map: { onnId -> [{ doctor, fromOnnName, duties }] } for a given day
function getActiveFloaterIds(dayData) {
  // A floater is "active" if assigned in coverage OR manually activated
  const ids = new Set();
  const staff = dayData?.staff || {};
  for (const [onnId, slot] of Object.entries(staff)) {
    if (!slot || typeof slot !== "object") continue;
    // Manual activation via Add Float button
    if (slot.floaterActive) ids.add(Number(onnId));
    // Coverage assignment
    const dc = slot.docCoverage || {};
    for (const a of Object.values(dc)) {
      if (!a || typeof a !== "object") continue;
      if (a.outlookOnnId) ids.add(Number(a.outlookOnnId));
      if (a.epicOnnId) ids.add(Number(a.epicOnnId));
    }
  }
  return ids;
}
function getCoverageTargetIdSet(dayData, teamOnns = ONNs) {
  const ids = new Set();
  const activeFloaterIds = getActiveFloaterIds(dayData);
  (teamOnns || []).forEach(onn => {
    if (!onn) return;
    const normalizedId = String(onn.id);
    if (onn.floater) {
      if (activeFloaterIds.has(Number(onn.id))) ids.add(normalizedId);
      return;
    }
    if (!isAway(getSlot(dayData, onn.id).status)) ids.add(normalizedId);
  });
  return ids;
}
function matchesDayStatusFilter(onn, slot, statusFilter) {
  if (!statusFilter) return true;
  if (!onn?.floater) {
    if (statusFilter === "away") return isAway(slot?.status);
    return slot?.status === statusFilter;
  }
  if (statusFilter === "away") return false;
  return (slot?.floaterLoc || STATUS.CH) === statusFilter;
}
function buildIncomingCoverage(dayData, teamOnns) {
  const availableCoverageIds = getCoverageTargetIdSet(dayData, teamOnns);
  const map = {}; // onnId -> [{ doctor, fromOnnName, duty }]
  teamOnns.forEach(absentOnn => {
    const slot = getSlot(dayData, absentOnn.id);
    if (!isAway(slot.status)) return;
    const dc = slot.docCoverage || {};
    absentOnn.primary.forEach(doc => {
      const a = dc[doc] || {};
      const outlookId = a.outlookOnnId != null ? String(a.outlookOnnId).trim() : "";
      const epicId = a.epicOnnId != null ? String(a.epicOnnId).trim() : "";
      if (outlookId && availableCoverageIds.has(outlookId)) {
        const tid = Number(outlookId);
        if (!map[tid]) map[tid] = [];
        map[tid].push({
          doctor: doc,
          fromOnnName: absentOnn.name,
          duty: "outlook"
        });
      }
      if (epicId && availableCoverageIds.has(epicId)) {
        const tid = Number(epicId);
        if (!map[tid]) map[tid] = [];
        map[tid].push({
          doctor: doc,
          fromOnnName: absentOnn.name,
          duty: "epic"
        });
      }
    });
  });
  return map;
}

// ─── STORAGE ADAPTER ─────────────────────────────────────────────────────────
// Storage backend contract (raw string KV):
// backend.get(key: string) -> Promise<{ value: string|null }|null>
// backend.set(key: string, value: string) -> Promise<void>
// backend.delete(key: string) -> Promise<void>
// backend.list(prefix?: string) -> Promise<{ keys: string[] }|string[]>

// ─── SHAREPOINT INTEGRATION ──────────────────────────────────────────────────
// When ready to connect to SharePoint, set the following before this script runs:
//
//   window.onnStorageBackend = { name, get, set, delete, list }
//
// Netlify can also provide a default backend via window.onnDefaultStorageBackend.
// An explicit window.onnStorageBackend still wins, so the SharePoint path stays intact.
//
// The backend must implement:
//   get(key)           → Promise<{ value: string } | null>
//   set(key, value)    → Promise<void>  — MUST throw on failure (do not swallow errors)
//   delete(key)        → Promise<void>
//   list(prefix)       → Promise<{ keys: string[] }>
//
// Keys used by this app:
//   onn_week5_YYYY-MM-DD   (weekly schedule data)
//   onn_team_v2            (team roster)
//   onn_settings_v1        (preferences: lightMode, textSize, deptName, assistantEnabled)
//   onn_team_nextid_v1     (high-water mark for future team IDs)
//
// IT checklist:
//   [ ] Create SharePoint List: ONNSchedulerData
//       Columns: Title (key), Json (multiline text), SavedAt (datetime), SavedBy (person)
//   [ ] Enable version history on the list (rollback safety net)
//   [ ] Create Entra/Azure App Registration (Single Page App)
//       Delegated permission: Sites.ReadWrite.All (or site-scoped equivalent)
//       Add redirect URI: <URL where this file is hosted>
//   [ ] Set window.onnStorageBackend before this script (in a wrapper page or web part)
//
// Without an explicit or default backend, the app falls back to localStorage below.
// ─────────────────────────────────────────────────────────────────────────────

function createLocalStorageBackend(namespace = "onn_scheduler:") {
  const keyFor = (k) => `${namespace}${k}`;

  return {
    name: "localStorage",

    async get(key) {
      const v = localStorage.getItem(keyFor(key));
      return v == null ? null : { value: v };
    },

    async set(key, value) {
      localStorage.setItem(keyFor(key), value);
    },

    async delete(key) {
      localStorage.removeItem(keyFor(key));
    },

    async list(prefix = "") {
      const fullPrefix = keyFor(prefix);
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const rawKey = localStorage.key(i);
        if (!rawKey) continue;
        if (!rawKey.startsWith(fullPrefix)) continue;
        keys.push(rawKey.slice(namespace.length)); // strip namespace
      }
      keys.sort();
      return { keys };
    },
  };
}

function normalizeListResult(r) {
  // Accept either {keys:[...]} or just [...]
  if (!r) return [];
  if (Array.isArray(r)) return r.filter((k) => typeof k === "string");
  if (Array.isArray(r.keys)) return r.keys.filter((k) => typeof k === "string");
  return [];
}

const StorageAdapter = (() => {
  const namespace = "onn_scheduler:";

  const hasBackendShape = candidate =>
    candidate &&
    typeof candidate.get === "function" &&
    typeof candidate.set === "function" &&
    typeof candidate.delete === "function" &&
    typeof candidate.list === "function";

  const explicit = hasBackendShape(window.onnStorageBackend) ? window.onnStorageBackend : null;
  const defaultBackend = hasBackendShape(window.onnDefaultStorageBackend) ? window.onnDefaultStorageBackend : null;
  const backend = explicit || defaultBackend || createLocalStorageBackend(namespace);

  return {
    get backendName() {
      return backend.name || (explicit || defaultBackend ? "injected" : "localStorage");
    },

    async get(key) {
      const r = await backend.get(key);
      if (!r || !r.value) return null;
      try {
        return JSON.parse(r.value);
      } catch {
        return null;
      }
    },

    async set(key, value) {
      try {
        await backend.set(key, JSON.stringify(value));
      } catch (err) {
        // Re-throw so callers can surface the failure to the user
        throw err;
      }
    },

    async remove(key) {
      try {
        await backend.delete(key);
      } catch (err) {
        throw err;
      }
    },

    async keys(prefix = "") {
      const r = await backend.list(prefix);
      return normalizeListResult(r);
    },
  };
})();

const TEAM_KEY = "onn_team_v2";

// Tracks the highest ID ever issued so deleting a member never lets a new one
// inherit that ID and silently remap historical schedule data to the wrong person.
const NEXT_ID_KEY = "onn_team_nextid_v1";
async function loadNextId() { return await StorageAdapter.get(NEXT_ID_KEY); }

async function loadTeam() {
  return await StorageAdapter.get(TEAM_KEY);

async function saveTeam(team) {
  // Safety: IDs must be present and unique forever, or old schedules will map wrong.
  if (!Array.isArray(team)) {
    alert("Team data is invalid. Not saved.");
    return;
  }

  const ids = team.map(o => o?.id);
  const bad = ids.some(id => id == null || id === "" || !Number.isFinite(Number(id)));
  if (bad) {
    alert("One or more team members are missing a valid numeric ID. Not saved.");
    return;
  }

  const normalized = ids.map(id => String(Number(id)));
  const unique = new Set(normalized);
  if (unique.size !== normalized.length) {
    alert("Duplicate team member IDs found. IDs must be unique. Not saved.");
    return;
  }

  await StorageAdapter.set(TEAM_KEY, team);
}

const skey = (ws) => `onn_week5_${ws.toISOString().slice(0, 10)}`;

function getEditSessionId() {
  const fallback = `onn_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 10)}`;
  try {
    if (typeof window === "undefined" || !window.sessionStorage) return fallback;
    const existing = window.sessionStorage.getItem("onn_edit_session_id");
    if (existing) return existing;
    window.sessionStorage.setItem("onn_edit_session_id", fallback);
    return fallback;
  } catch {
    return fallback;
  }
}

function isEditLockActive(lock, now = Date.now()) {
  const expiresAt = Date.parse(lock?.expiresAt || "");
  return Number.isFinite(expiresAt) && expiresAt > now;
}

function formatRelativeTime(value) {
  const ts = Date.parse(value || "");
  if (!Number.isFinite(ts)) return "";
  const elapsedMs = Math.max(0, Date.now() - ts);
  if (elapsedMs < 45 * 1000) return "just now";
  const units = [{
    ms: 365 * 24 * 60 * 60 * 1000,
    label: "year"
  }, {
    ms: 30 * 24 * 60 * 60 * 1000,
    label: "month"
  }, {
    ms: 7 * 24 * 60 * 60 * 1000,
    label: "week"
  }, {
    ms: 24 * 60 * 60 * 1000,
    label: "day"
  }, {
    ms: 60 * 60 * 1000,
    label: "hour"
  }, {
    ms: 60 * 1000,
    label: "minute"
  }];
  const match = units.find(unit => elapsedMs >= unit.ms) || units[units.length - 1];
  const amount = Math.floor(elapsedMs / match.ms) || 1;
  return `${amount} ${match.label}${amount === 1 ? "" : "s"} ago`;
}

function localDraftKey(ws) {
  return `${LOCAL_DRAFT_PREFIX}${ws.toISOString().slice(0, 10)}`;
}

function loadLocalDraft(ws) {
  try {
    if (!(ws instanceof Date) || Number.isNaN(ws.getTime())) return null;
    const raw = localStorage.getItem(localDraftKey(ws));
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== "object" || !parsed.data || typeof parsed.data !== "object") return null;
    return {
      updatedAt: typeof parsed.updatedAt === "string" ? parsed.updatedAt : "",
      data: parsed.data
    };
  } catch {
    return null;
  }
}

function saveLocalDraft(ws, data) {
  try {
    if (!(ws instanceof Date) || Number.isNaN(ws.getTime()) || !data || typeof data !== "object") return "";
    const updatedAt = new Date().toISOString();
    localStorage.setItem(localDraftKey(ws), JSON.stringify({
      updatedAt,
      data
    }));
    return updatedAt;
  } catch (err) {
    console.error("ONN Scheduler local draft save error:", err);
    return "";
  }
}

function clearLocalDraft(ws) {
  try {
    if (!(ws instanceof Date) || Number.isNaN(ws.getTime())) return;
    localStorage.removeItem(localDraftKey(ws));
  } catch (err) {
    console.error("ONN Scheduler local draft clear error:", err);
  }
}

function getSaveFailureMessage(err, hasLocalDraft = false) {
  const draftSuffix = hasLocalDraft ? " This browser kept a recovery draft for this week." : " Please copy your changes before leaving this page.";
  if (err?.code === "conflict") {
    return "Another person saved this week first. Reload this week before saving again so you do not overwrite newer changes.";
  }
  if (err?.code === "auth") {
    return `Your shared-password session expired. Enter it again, then save once more.${draftSuffix}`;
  }
  if (err?.code === "storage") {
    return `Shared storage is unavailable right now, so this week could not be saved online.${draftSuffix}`;
  }
  return `Save failed, and this week was not stored.${draftSuffix}`;
}

async function loadWeekLock(ws) {

async function releaseEditLock(ws, sessionId) {
  const key = lkey(ws);

    acquiredAt: new Date(now).toISOString(),
    lastSeenAt: new Date(now).toISOString(),
    expiresAt: new Date(now + EDIT_LOCK_TTL_MS).toISOString()

async function applyVacationCarryover(ws, weekData, teamOnns = ONNs) {
  const targetDates = getWeekDates(ws).map((d) => {
    const x = new Date(d);
    x.setHours(0, 0, 0, 0);
    return x;
  });
  const targetStart = targetDates[0];
  const targetEnd = targetDates[targetDates.length - 1];

  const byDay = {};
  DAYS.forEach((d) => (byDay[d] = {}));

  const teamMap = new Map((teamOnns || []).map((o) => [String(o.id), o]));

  // Only pull keys for this app (prefix filter avoids scanning whole storage)
  const weekKeys = await StorageAdapter.keys("onn_week5_");

for (const k of weekKeys) {
  if (typeof k !== "string" || !k.startsWith("onn_week5_")) continue;
  const keyDatePart = k.slice("onn_week5_".length);
  const weekStart = parseDateAtStartOfDay(keyDatePart);
  
    if (!weekStart || weekStart > targetEnd) continue;

    const stored = await StorageAdapter.get(k);
    if (!stored || typeof stored !== "object") continue;

    DAYS.forEach((dayName, dayIdx) => {
      const staff = stored?.[dayName]?.staff;
      if (!staff || typeof staff !== "object") return;

      const occDate = new Date(weekStart);
      occDate.setDate(weekStart.getDate() + dayIdx);
      occDate.setHours(0, 0, 0, 0);

      Object.entries(staff).forEach(([onnId, rawSlot]) => {
        const member = teamMap.get(String(onnId));
        if (!member || member.floater) return;
        if (!rawSlot || rawSlot.status !== STATUS.VACATION) return;

        const returnIso = toISODateString(rawSlot.returnDate || "");
        if (!returnIso) return;

        const retDate = parseDateAtStartOfDay(returnIso);
        if (!retDate || occDate >= retDate || retDate <= targetStart) return;

        for (let i = 0; i < DAYS.length; i++) {
          const td = targetDates[i];
          if (td >= occDate && td < retDate) {
            const dName = DAYS[i];
            const existing = byDay[dName][onnId];
            const occTs = occDate.getTime();
            if (!existing || occTs > existing.occTs) {
              byDay[dName][onnId] = {
                occTs,
                returnDate: returnIso,
                docCoverage:
                  rawSlot.docCoverage && typeof rawSlot.docCoverage === "object"
                    ? rawSlot.docCoverage
                    : {},
              };
            }
          }
        }
      });
    });
  }

  const out = { ...weekData };

  DAYS.forEach((dayName) => {
    const dayBase = out[dayName] || { notes: "", holiday: false, staff: {} };
    const staff = { ...(dayBase.staff || {}) };

    Object.entries(byDay[dayName]).forEach(([onnId, carry]) => {
      const existing = getSlot(dayBase, Number(onnId));
      if (isAway(existing.status)) return;

      const hasExistingCoverage =
        existing.docCoverage && Object.keys(existing.docCoverage).length > 0;

      staff[onnId] = {
        ...existing,
        status: STATUS.VACATION,
        returnDate: carry.returnDate,
        docCoverage: hasExistingCoverage
          ? existing.docCoverage
          : carry.docCoverage || existing.docCoverage || {},
      };
    });

    out[dayName] = { ...dayBase, staff };
  });

  return out;
}

async function loadWeekWithCarryover(ws, teamOnns = ONNs) {
  const rawStored = await loadWeek(ws);
  let stored = rawStored;

  const currentWeekStart = getWeekStart(0);
  const isFutureWeek = ws.getTime() > currentWeekStart.getTime();
  const hasUserSavedMeta = !!rawStored?._meta?.userSaved;

  if (stored && isFutureWeek && !hasUserSavedMeta) {
    const hydratedStored = hydrateWeekData(stored, teamOnns);
    if (!weekHasStrongSignals(hydratedStored, teamOnns)) {
      stored = null;
    }
  }

	const baseWeek =
	  stored && typeof stored === "object" ? stored : buildDefault(teamOnns);

const hydrated = hydrateWeekData(baseWeek, teamOnns);
  // If this week has been explicitly saved by any user, trust it as-is.
  // Carryover is only for pre-filling weeks nobody has touched yet.
  const withCarry = hasUserSavedMeta
    ? hydrated
    : await applyVacationCarryover(ws, hydrated, teamOnns);

  return { data: syncWeekDataToTeam(withCarry, teamOnns), existed: !!stored?._meta?.userSaved };
}

      record[String(header || "").trim()] = row[idx] != null ? String(row[idx]) : "";
    });
    return record;
  });
}
function normalizeOutlookCsvColumnName(name) {
  return String(name || "").toLowerCase().replace(/[^a-z0-9]/g, "");
}
function getOutlookCsvValue(record, candidateNames) {
  if (!record || typeof record !== "object") return "";
  const entries = Object.entries(record);
  for (const candidate of candidateNames) {
    const wanted = normalizeOutlookCsvColumnName(candidate);
    const match = entries.find(([key]) => normalizeOutlookCsvColumnName(key) === wanted);
    if (match && String(match[1] || "").trim() !== "") {
      return String(match[1] || "").trim();
    }
  }
  return "";
}
function parseOutlookCsvBoolean(value) {
  const cleaned = String(value || "").trim().toLowerCase();
  return cleaned === "true" || cleaned === "yes" || cleaned === "y" || cleaned === "1";
}
function parseOutlookCsvTimeParts(value) {
  const cleaned = String(value || "").trim();
  if (!cleaned) return null;
  const m = cleaned.match(/^(\d{1,2})(?::(\d{2}))?(?::(\d{2}))?\s*(AM|PM)?$/i);
  if (!m) return null;
  let hour = Number(m[1] || 0);
  const minute = Number(m[2] || 0);
  const second = Number(m[3] || 0);
  const meridiem = String(m[4] || "").toUpperCase();
  if (meridiem === "PM" && hour < 12) hour += 12;
  if (meridiem === "AM" && hour === 12) hour = 0;
  if (hour > 23 || minute > 59 || second > 59) return null;
  return {
    hour,
    minute,
    second
  };
}
function combineOutlookCsvDateAndTime(dateValue, timeValue) {
  const date = parseDateAtStartOfDay(dateValue);
  if (!date) return null;
  const time = parseOutlookCsvTimeParts(timeValue);
  if (!time) return date;
  date.setHours(time.hour, time.minute, time.second, 0);
  return date;
}
function isOutlookCsvMidnightTime(timeValue) {
  const time = parseOutlookCsvTimeParts(timeValue);
  return !!time && time.hour === 0 && time.minute === 0 && time.second === 0;
}
function getOutlookCsvEventDates(record) {
  const startDateValue = getOutlookCsvValue(record, ["Start Date", "StartDate", "Start"]);
  const endDateValue = getOutlookCsvValue(record, ["End Date", "EndDate", "End"]);
  const startTimeValue = getOutlookCsvValue(record, ["Start Time", "StartTime"]);
  const endTimeValue = getOutlookCsvValue(record, ["End Time", "EndTime"]);
  const allDay = parseOutlookCsvBoolean(getOutlookCsvValue(record, ["All day event", "AllDayEvent"]));
  const startDate = combineOutlookCsvDateAndTime(startDateValue, startTimeValue);
  if (!startDate) return [];
  const endDate = combineOutlookCsvDateAndTime(endDateValue || startDateValue, endTimeValue);
  const dates = [];
  const cursor = new Date(startDate);
  cursor.setHours(0, 0, 0, 0);
  let last = endDate ? new Date(endDate) : new Date(startDate);
  last.setHours(0, 0, 0, 0);
  if (last.getTime() > cursor.getTime() && ((allDay || isOutlookCsvMidnightTime(endTimeValue)) && (!endTimeValue || isOutlookCsvMidnightTime(endTimeValue)))) {
    last.setDate(last.getDate() - 1);
  }
  if (last.getTime() < cursor.getTime()) {
    return [cursor];
  }
  while (cursor.getTime() <= last.getTime()) {
    dates.push(new Date(cursor));
    cursor.setDate(cursor.getDate() + 1);
  }
  return dates;
}
function collectOutlookSkippedEventSample(list, summary, limit = 5) {
  if (!Array.isArray(list) || list.length >= limit) return;
  const cleaned = trimOutlookSummaryText(summary);
  if (!cleaned || list.includes(cleaned)) return;
  list.push(cleaned);
}
function formatOutlookSkippedEventSamples(samples, totalCount = 0, maxShown = 3) {
  const shown = Array.isArray(samples) ? samples.filter(Boolean).slice(0, maxShown) : [];
  if (shown.length === 0) return "";
  const hiddenCount = Math.max(0, Number(totalCount) - shown.length);
  const rendered = shown.map(sample => `"${sample}"`).join(", ");
  return hiddenCount > 0 ? `${rendered}, plus ${hiddenCount} more` : rendered;
}
async function applyOutlookImportEntries(entries, teamList) {
  if (!Array.isArray(teamList) || teamList.length === 0) {
    throw new Error("Team list is not available for calendar import.");
  }
  const normalizedEntries = Array.isArray(entries) ? entries : [];
  const weeksToSave = new Map();
  const skippedEvents = [];
  const skippedEventSamples = [];
  const appliedSlotKeys = new Set();
  let importedEvents = 0;
  let importedDays = 0;
  let weekendDaysSkipped = 0;
  let duplicateDaysSkipped = 0;
  for (const entry of normalizedEntries) {
    const summary = trimOutlookSummaryText(entry?.summary || "");
    const parsed = parseOutlookCalendarSummary(summary, teamList);
    const dates = Array.isArray(entry?.dates) ? entry.dates.filter(date => date instanceof Date && !Number.isNaN(date.getTime())) : [];
    if (!parsed || dates.length === 0) {
      if (summary) {
        skippedEvents.push(summary);
        collectOutlookSkippedEventSample(skippedEventSamples, summary);
      }
      continue;
    }
    let appliedThisEvent = false;
    const lastDate = dates[dates.length - 1];
    const returnDate = parsed.status === STATUS.VACATION ? toISODateString(new Date(lastDate.getFullYear(), lastDate.getMonth(), lastDate.getDate() + 1)) : "";
    for (const date of dates) {
      const dayName = getDayNameForDate(date);
      if (!dayName) {
        weekendDaysSkipped += 1;
        continue;
      }
      const weekStart = getWeekStartForDate(date);
      const weekKey = skey(weekStart);
      const slotKey = `${weekKey}|${dayName}|${parsed.onn.id}|${parsed.status}|${returnDate}`;
      if (appliedSlotKeys.has(slotKey)) {
        duplicateDaysSkipped += 1;
        continue;
      }
      appliedSlotKeys.add(slotKey);
      let weekData = weeksToSave.get(weekKey);
      if (!weekData) {
        const loaded = await loadWeekWithCarryover(weekStart, teamList);
        weekData = loaded?.data && typeof loaded.data === "object" ? loaded.data : syncWeekDataToTeam(buildDefault(teamList), teamList);
        weeksToSave.set(weekKey, weekData);
      }
      const dayData = weekData[dayName] || {
        notes: "",
        holiday: false,
        staff: {}
      };
      const slot = getSlot(dayData, parsed.onn.id);
      weekData[dayName] = {
        ...dayData,
        staff: {
          ...(dayData.staff || {}),
          [parsed.onn.id]: {
            ...slot,
            status: parsed.status,
            cov1: "",
            cov2: "",
            docCoverage: isAway(parsed.status) ? slot.docCoverage || {} : {},
            returnDate: parsed.status === STATUS.VACATION ? returnDate : ""
          }
        }
      };
      importedDays += 1;
      appliedThisEvent = true;
    }
    if (appliedThisEvent) importedEvents += 1;
  }
  for (const [weekKey, weekData] of weeksToSave.entries()) {
    const weekStart = parseDateAtStartOfDay(weekKey.slice("onn_week5_".length));
    if (!weekStart) continue;
    await saveWeek(weekStart, weekData);
  }
  return {
    totalEvents: normalizedEntries.length,
    importedEvents,
    importedDays,
    weekendDaysSkipped,
    duplicateDaysSkipped,
    skippedEvents,
    skippedEventSamples,
    updatedWeeks: Array.from(weeksToSave.keys()).sort()
  };
}
async function importOutlookCalendarCsvText(text, teamList) {
  const records = parseCsvRecords(text);
  return await applyOutlookImportEntries(records.map(record => ({
    summary: getOutlookCsvValue(record, ["Subject", "Title"]),
    dates: getOutlookCsvEventDates(record)
  })), teamList);
}
async function importOutlookCalendarIcsText(text, teamList) {
  const events = parseIcsEvents(text);
  return await applyOutlookImportEntries(events.map(event => ({
    summary: getIcsField(event, "SUMMARY")?.value || "",
    dates: getIcsEventDates(event)
  })), teamList);
}
async function importOutlookCalendarFileText(file, text, teamList) {
  const fileName = String(file?.name || "").toLowerCase();
  const trimmedText = String(text || "").trim();
  if (fileName.endsWith(".csv")) {
    return await importOutlookCalendarCsvText(trimmedText, teamList);
  }
  if (fileName.endsWith(".ics") || /^BEGIN:VCALENDAR/i.test(trimmedText)) {
    return await importOutlookCalendarIcsText(trimmedText, teamList);
  }
  const records = parseCsvRecords(trimmedText);
  if (records.length > 0 && Object.keys(records[0] || {}).some(key => {
    const normalized = normalizeOutlookCsvColumnName(key);
    return normalized === "subject" || normalized === "title";
  })) {
    return await importOutlookCalendarCsvText(trimmedText, teamList);
  }
  return await importOutlookCalendarIcsText(trimmedText, teamList);
}
